<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת אישורים - כרמיה</title>
    
    <!-- סקריפטים חיצוניים -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { background-color: #f5f5f7; margin: 0; font-family: system-ui, -apple-system, sans-serif; }
        .loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; font-size: 20px; color: #86868b; }
    </style>
</head>
<body>

    <!-- זה מה שיוצג אם ה-JS לא נטען או עדיין בטעינה -->
    <div id="root">
        <div class="loading-screen">
            <div>מתחבר למערכת כרמיה, אנא המתן...</div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNAlwhFVlUnyYpPhjUaw_CWlvigtRJOEmM7qyFNHvXo0eksT9diQkcJsfUL8wogKGB-g/exec"; 

        const InputField = ({ label, type, name, value, onChange, placeholder, required = true }) => (
            <div className="mb-5">
                <label className="block text-[13px] font-semibold text-gray-500 mb-2">{label}</label>
                <input 
                    type={type} name={name} value={value} onChange={onChange}
                    className="w-full px-4 h-14 rounded-2xl bg-[#f5f5f7] border border-transparent focus:bg-white focus:border-[#0071e3] outline-none text-[17px]" 
                    placeholder={placeholder} required={required} 
                />
            </div>
        );

        const App = () => {
            const [loanData, setLoanData] = useState({ id: null, name: '', amount: '', purpose: '', date: '' });
            const [step, setStep] = useState(1);
            const [submitting, setSubmitting] = useState(false);
            const [guarantors, setGuarantors] = useState([
                { firstName: '', lastName: '', idNumber: '', phone: '', address: '', hasSignature: false },
                { firstName: '', lastName: '', idNumber: '', phone: '', address: '', hasSignature: false }
            ]);

            useEffect(() => {
                try {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (id) {
                        setLoanData({
                            id: id,
                            name: params.get('name') || 'לא סופק',
                            amount: params.get('amount') || '0',
                            purpose: params.get('purpose') || 'לא צוין',
                            date: params.get('date') || ''
                        });
                    }
                } catch (e) { console.error("URL Parsing error", e); }
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setSubmitting(true);
                // כאן תהיה הקריאה לשרת
                setTimeout(() => { setSubmitting(false); setStep(2); }, 2000);
            };

            if (!loanData.id && step === 1) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="bg-white p-10 rounded-3xl shadow-xl text-center">
                            <h2 className="text-2xl font-bold text-red-500">שגיאת נתונים</h2>
                            <p className="mt-2 text-gray-600">לא נמצא מספר בקשה בקישור.</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-[#1c1c1e] text-white p-4 sticky top-0 z-50">
                        <div className="max-w-3xl mx-auto flex justify-between items-center">
                            <span className="font-bold">אישור מנהל - כרמיה</span>
                            <span className="text-sm opacity-70">בקשה #{loanData.id}</span>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto mt-10 px-4">
                        {step === 1 ? (
                            <form onSubmit={handleSubmit} className="animate-fade-in">
                                <div className="bg-blue-50 p-6 rounded-3xl border border-blue-100 mb-8">
                                    <h3 className="font-bold text-blue-900 mb-4 text-lg">פרטי הלווה</h3>
                                    <div className="grid grid-cols-2 gap-4 text-sm">
                                        <div><span className="text-blue-600 block">שם:</span> <span className="font-bold">{loanData.name}</span></div>
                                        <div><span className="text-blue-600 block">סכום:</span> <span className="font-bold">{loanData.amount} ₪</span></div>
                                        <div><span className="text-blue-600 block">מטרה:</span> <span className="font-bold">{loanData.purpose}</span></div>
                                        <div><span className="text-blue-600 block">תאריך:</span> <span className="font-bold">{loanData.date}</span></div>
                                    </div>
                                </div>

                                <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 mb-8">
                                    <h3 className="font-bold text-xl mb-6 text-gray-800">הזנת ערבים</h3>
                                    {guarantors.map((g, i) => (
                                        <div key={i} className="mb-10 pb-6 border-b last:border-0 border-gray-100">
                                            <h4 className="font-bold text-blue-600 mb-4">ערב {i+1}</h4>
                                            <div className="grid grid-cols-2 gap-4">
                                                <InputField label="שם פרטי" type="text" value={g.firstName} onChange={(e) => {
                                                    const n = [...guarantors]; n[i].firstName = e.target.value; setGuarantors(n);
                                                }} />
                                                <InputField label="שם משפחה" type="text" value={g.lastName} onChange={(e) => {
                                                    const n = [...guarantors]; n[i].lastName = e.target.value; setGuarantors(n);
                                                }} />
                                            </div>
                                        </div>
                                    ))}
                                    <button type="submit" className="w-full bg-[#0071e3] text-white py-4 rounded-2xl font-bold hover:bg-[#0077ed] transition-all">
                                        {submitting ? "מעבד..." : "אשר הלוואה והנפק שטר"}
                                    </button>
                                </div>
                            </form>
                        ) : (
                            <div className="bg-white p-10 rounded-3xl shadow-sm text-center">
                                <div className="text-5xl mb-4">✅</div>
                                <h2 className="text-3xl font-bold">הבקשה אושרה!</h2>
                                <p className="text-gray-500 mt-2">שטר הלוואה נשלח כעת ללווה.</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
