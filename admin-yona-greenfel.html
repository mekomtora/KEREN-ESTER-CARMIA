<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת אישורים - קרן אסתר כרמיה</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        apple: {
                            bg: '#f5f5f7',
                            card: '#ffffff',
                            text: '#1d1d1f',
                            muted: '#86868b',
                            blue: '#0071e3',
                            blueHover: '#0077ed',
                            inputBg: '#f5f5f7',
                            border: '#d2d2d7'
                        }
                    },
                    boxShadow: {
                        'apple': '0 4px 24px rgba(0,0,0,0.04)',
                        'apple-hover': '0 10px 40px rgba(0,0,0,0.08)'
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f5f5f7; 
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
        }

        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        input, select { transition: all 0.2s ease-in-out; }
        
        .apple-header-glass {
            background-color: rgba(28, 28, 30, 0.85); 
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }

        .apple-spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #86868b;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .apple-checkbox {
            appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid #d2d2d7;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            position: relative;
            background-color: #f5f5f7;
            transition: all 0.2s;
        }
        .apple-checkbox:checked {
            background-color: #34c759;
            border-color: #34c759;
        }
        .apple-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 7px;
            top: 3px;
            width: 6px;
            height: 12px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // כאן נשים בהמשך את הקישור לשרת
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNAlwhFVlUnyYpPhjUaw_CWlvigtRJOEmM7qyFNHvXo0eksT9diQkcJsfUL8wogKGB-g/exec"; 

        const isValidIsraeliID = (id) => {
            let strId = String(id).trim();
            if (strId.length > 9 || strId.length < 5) return false;
            strId = strId.padStart(9, '0');
            return Array.from(strId, Number).reduce((counter, digit, i) => {
                const step = digit * ((i % 2) + 1);
                return counter + (step > 9 ? step - 9 : step);
            }) % 10 === 0;
        };

        const isValidMobile = (phone) => /^05\d{8}$/.test(phone);

        const InputField = ({ label, type, name, value, onChange, placeholder, required = true, error, className = "" }) => (
            <div className={`mb-5 ${className}`}>
                <label className="block text-[13px] font-semibold text-apple-muted mb-2 pl-1">{label} {required && <span className="text-red-500">*</span>}</label>
                <input 
                    type={type} name={name} value={value} onChange={onChange}
                    className={`w-full px-4 h-14 rounded-2xl bg-apple-inputBg border ${error ? 'border-red-400 bg-red-50 text-red-900' : 'border-transparent text-apple-text'} outline-none focus:bg-white focus:border-apple-blue focus:ring-4 focus:ring-apple-blue/20 text-[17px]`} 
                    placeholder={placeholder} required={required} 
                />
                {error && <p className="text-red-500 text-[12px] mt-1.5 font-medium ml-2">{error}</p>}
            </div>
        );

        const SectionCard = ({ title, children, className = "" }) => (
            <div className={`bg-apple-card rounded-[24px] p-8 md:p-10 shadow-apple mb-8 border border-gray-100 ${className}`}>
                <div className="mb-6 border-b border-gray-100 pb-4">
                    <h2 className="text-2xl font-semibold tracking-tight text-apple-text">{title}</h2>
                </div>
                {children}
            </div>
        );

        const App = () => {
            const [step, setStep] = useState(1);
            const [submitting, setSubmitting] = useState(false);
            
            const [loanData, setLoanData] = useState({
                id: null,
                name: '',
                amount: '',
                purpose: '',
                date: ''
            });
            
            const [adminData, setAdminData] = useState({
                paymentStartDate: '',
                collectionDay: '10'
            });

            const getEmptyGuarantor = () => ({ firstName: '', lastName: '', idNumber: '', phone: '', email: '', address: '', hasSignature: false });
            const [guarantors, setGuarantors] = useState([getEmptyGuarantor(), getEmptyGuarantor()]);
            const [errors, setErrors] = useState({});

            // שאיבת פרטי הבקשה מהקישור
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const idFromUrl = params.get('id');
                if (idFromUrl) {
                    setLoanData({
                        id: idFromUrl,
                        name: params.get('name') || 'לא סופק',
                        amount: params.get('amount') || 'לא סופק',
                        purpose: params.get('purpose') || 'לא סופק',
                        date: params.get('date') || 'לא סופק'
                    });
                }
            }, []);

            const handleAdminChange = (e) => {
                setAdminData({ ...adminData, [e.target.name]: e.target.value });
            };

            const handleGuarantorChange = (index, field, value) => {
                const newGuarantors = [...guarantors];
                newGuarantors[index][field] = value;
                setGuarantors(newGuarantors);
                
                const errorKey = `g_${index}_${field}`;
                if (errors[errorKey]) {
                    setErrors(prev => ({ ...prev, [errorKey]: null }));
                }
            };

            const addGuarantor = () => setGuarantors([...guarantors, getEmptyGuarantor()]);
            const removeGuarantor = (index) => {
                if (guarantors.length > 2) setGuarantors(guarantors.filter((_, i) => i !== index));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                let currentErrors = {};

                guarantors.forEach((g, idx) => {
                    if (!isValidIsraeliID(g.idNumber)) currentErrors[`g_${idx}_idNumber`] = 'תעודת זהות לא תקינה';
                    if (!isValidMobile(g.phone)) currentErrors[`g_${idx}_phone`] = 'מספר טלפון לא תקין';
                    if (!g.hasSignature) currentErrors[`g_${idx}_sig`] = 'חובה לסמן אישור חתימה';
                });

                if (Object.keys(currentErrors).length > 0) {
                    setErrors(currentErrors);
                    alert('אנא תקנו את השגיאות בטופס לפני האישור.');
                    return;
                }

                setSubmitting(true);

                try {
                    const payload = {
                        action: 'approve_loan',
                        loanId: loanData.id,
                        paymentStartDate: adminData.paymentStartDate,
                        collectionDay: adminData.collectionDay,
                        guarantors: guarantors
                    };

                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors", 
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    setTimeout(() => {
                        setSubmitting(false);
                        setStep(2);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }, 2500);

                } catch (err) {
                    setSubmitting(false);
                    alert("אירעה שגיאה בתקשורת מול השרת. אנא נסה שנית.");
                }
            };

            if (!loanData.id && step === 1) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-apple-bg">
                        <div className="bg-white p-10 rounded-[24px] shadow-apple text-center">
                            <h2 className="text-2xl font-bold text-red-500 mb-2">שגיאת מערכת</h2>
                            <p className="text-apple-muted">חסר מזהה בקשה (ID) בקישור. לא ניתן לאשר הלוואה.</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    {submitting && (
                        <div className="fixed inset-0 bg-apple-bg/80 backdrop-blur-xl flex items-center justify-center z-50">
                            <div className="flex flex-col items-center">
                                <div className="apple-spinner mb-4"></div>
                                <h3 className="text-xl font-semibold mt-4">מאשר בקשה ומפיק שטר הלוואה...</h3>
                            </div>
                        </div>
                    )}
                    
                    <header className="fixed top-0 w-full apple-header-glass border-b border-gray-800 z-40">
                        <div className="max-w-4xl mx-auto px-6 h-16 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                {/* לוגו מקום תורה */}
                                <div className="w-10 h-10 bg-white rounded-lg border border-gray-700 shadow-sm flex items-center justify-center overflow-hidden">
                                    <img src="LOGO_MEKOMTORA.png" alt="לוגו מקום תורה" className="w-full h-full object-cover" />
                                </div>
                                <h1 className="text-[17px] font-bold text-white tracking-wide">מערכת אישורים - מנהל מאשר</h1>
                            </div>
                            <div className="text-[13px] text-gray-300 font-medium">
                                בקשה מס' {loanData.id}
                            </div>
                        </div>
                    </header>

                    <main className="flex-grow pt-28 pb-20 px-4 sm:px-6">
                        <div className="max-w-3xl mx-auto">
                            
                            {step === 1 && (
                                <div className="opacity-0 animate-fade-up">
                                    <div className="mb-8">
                                        <h2 className="text-3xl font-bold text-apple-text mb-2">אישור הלוואה - סניף כרמיה</h2>
                                    </div>

                                    {/* כרטיסיית פרטי הבקשה המיובאים */}
                                    <div className="bg-blue-50/50 border border-blue-100 rounded-[24px] p-6 md:p-8 mb-8 shadow-sm flex flex-col gap-4">
                                        <div className="flex items-center gap-2 mb-2">
                                            <svg className="w-5 h-5 text-apple-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                            <h3 className="text-lg font-bold text-blue-900">פרטי הבקשה לאישור (קריאה בלבד)</h3>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-[15px]">
                                            <div>
                                                <span className="block text-blue-700 text-sm mb-1">שם הלווה</span>
                                                <span className="font-semibold text-gray-900">{loanData.name}</span>
                                            </div>
                                            <div>
                                                <span className="block text-blue-700 text-sm mb-1">סכום מבוקש</span>
                                                <span className="font-semibold text-gray-900">{loanData.amount} ₪</span>
                                            </div>
                                            <div>
                                                <span className="block text-blue-700 text-sm mb-1">מטרת הלוואה</span>
                                                <span className="font-semibold text-gray-900">{loanData.purpose}</span>
                                            </div>
                                            <div>
                                                <span className="block text-blue-700 text-sm mb-1">תאריך הגשה</span>
                                                <span className="font-semibold text-gray-900">{loanData.date}</span>
                                            </div>
                                        </div>
                                    </div>

                                    <form onSubmit={handleSubmit}>
                                        
                                        <SectionCard title="מועדי פירעון (להוראת הקבע)">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                                                <InputField label="תאריך תחילת גבייה" name="paymentStartDate" type="date" value={adminData.paymentStartDate} onChange={handleAdminChange} />
                                                <div className="mb-2">
                                                    <label className="block text-[13px] font-semibold text-apple-muted mb-2 pl-1">יום גבייה קבוע בחודש <span className="text-red-500">*</span></label>
                                                    <select name="collectionDay" value={adminData.collectionDay} onChange={handleAdminChange} className="w-full px-4 h-14 rounded-2xl bg-apple-inputBg border border-transparent text-apple-text outline-none focus:bg-white focus:border-apple-blue focus:ring-4 text-[17px]">
                                                        <option value="1">1 לחודש</option>
                                                        <option value="10">10 לחודש</option>
                                                        <option value="15">15 לחודש</option>
                                                        <option value="20">20 לחודש</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </SectionCard>

                                        <div className="mb-6 flex justify-between items-end">
                                            <h3 className="text-2xl font-bold text-apple-text">פרטי ערבים</h3>
                                            <span className="text-sm font-medium text-apple-blue bg-blue-50 px-3 py-1 rounded-full">סה"כ: {guarantors.length} ערבים</span>
                                        </div>

                                        {guarantors.map((g, index) => (
                                            <div key={index} className="bg-white rounded-[24px] p-8 shadow-sm border border-gray-200 mb-6 relative transition-all hover:shadow-md">
                                                {index >= 2 && (
                                                    <button type="button" onClick={() => removeGuarantor(index)} className="absolute top-6 left-6 text-red-500 hover:text-red-700 bg-red-50 p-2 rounded-full transition-colors">
                                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                                    </button>
                                                )}
                                                
                                                <h4 className="font-semibold text-lg mb-5 flex items-center gap-2">
                                                    <div className="w-6 h-6 bg-apple-text text-white rounded-full flex items-center justify-center text-sm">{index + 1}</div>
                                                    ערב מספר {index + 1}
                                                </h4>
                                                
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                                                    <InputField label="שם פרטי" value={g.firstName} onChange={(e) => handleGuarantorChange(index, 'firstName', e.target.value)} type="text" />
                                                    <InputField label="שם משפחה" value={g.lastName} onChange={(e) => handleGuarantorChange(index, 'lastName', e.target.value)} type="text" />
                                                    <InputField label="תעודת זהות" value={g.idNumber} onChange={(e) => handleGuarantorChange(index, 'idNumber', e.target.value)} type="text" error={errors[`g_${index}_idNumber`]} />
                                                    <InputField label="טלפון נייד" value={g.phone} onChange={(e) => handleGuarantorChange(index, 'phone', e.target.value)} type="tel" error={errors[`g_${index}_phone`]} />
                                                </div>
                                                
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                                                    <InputField label="כתובת מגורים מלאה" value={g.address} onChange={(e) => handleGuarantorChange(index, 'address', e.target.value)} type="text" />
                                                    <InputField label="דואר אלקטרוני" value={g.email} onChange={(e) => handleGuarantorChange(index, 'email', e.target.value)} type="email" required={false} placeholder="לא חובה" />
                                                </div>

                                                <div className="mt-2 bg-green-50/50 p-4 rounded-xl border border-green-100 flex items-start gap-4">
                                                    <input 
                                                        type="checkbox" 
                                                        className="apple-checkbox mt-0.5 flex-shrink-0" 
                                                        checked={g.hasSignature}
                                                        onChange={(e) => handleGuarantorChange(index, 'hasSignature', e.target.checked)}
